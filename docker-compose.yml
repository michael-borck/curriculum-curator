# Local development compose — builds from source.
# For VPS/production deployment using pre-built GHCR image, see deploy/docker-compose.yml

services:
  app:
    build: .
    container_name: curriculum-curator
    restart: unless-stopped
    ports:
      - "8081:8000"  # Backend serves everything on port 8000
    networks:
      - caddy_default
    volumes:
      # Persistent data - these directories will survive container restarts
      - ./data/db:/app/backend/data
      - ./data/uploads:/app/backend/uploads
      - ./data/logs:/app/backend/logs
      - ./data/content_repo:/app/backend/content_repo
      - ./data/content_repos:/app/backend/content_repos
    environment:
      # Database
      - DATABASE_URL=sqlite:///./data/curriculum_curator.db
      
      # Security (CHANGE THESE IN PRODUCTION!)
      - SECRET_KEY=${SECRET_KEY:-your-secret-key-change-this-in-production}
      - ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=30
      
      # LLM API Keys (optional - users can configure in app)
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      
      # Local Mode (privacy-first, no login required)
      - LOCAL_MODE=${LOCAL_MODE:-false}

      # Ollama (set to http://ollama:11434 when using --profile local-ai)
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://localhost:11434}

      # Features
      - ENABLE_AI_FEATURES=${ENABLE_AI_FEATURES:-true}
      - ENABLE_FILE_UPLOAD=${ENABLE_FILE_UPLOAD:-true}
      - DEBUG=${DEBUG:-false}
      
      # Email (optional)
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USERNAME=${SMTP_USERNAME:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
      - SMTP_FROM_EMAIL=${SMTP_FROM_EMAIL:-}
      - SMTP_FROM_NAME=${SMTP_FROM_NAME:-Curriculum Curator}
      - SMTP_TLS=${SMTP_TLS:-true}

  ollama:
    image: ollama/ollama:latest
    container_name: curriculum-curator-ollama
    profiles:
      - local-ai
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - caddy_default

volumes:
  ollama_data:

networks:
  caddy_default:
    external: true