# VPS production compose — no source code needed, just this file + .env
# See deploy/.env.example for all configurable variables
#
# Usage:
#   cp .env.example .env && vim .env
#   docker compose up -d

services:
  app:
    image: ghcr.io/michael-borck/curriculum-curator:latest
    container_name: curriculum-curator
    restart: unless-stopped
    ports:
      - "8081:8000"
    env_file: .env
    volumes:
      - ./data/db:/app/backend/data
      - ./data/uploads:/app/backend/uploads
      - ./data/logs:/app/backend/logs
      - ./data/content_repo:/app/backend/content_repo
      - ./data/content_repos:/app/backend/content_repos
      - ./data/user_templates:/app/backend/user_templates
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    networks:
      - caddy_default

  watchtower:
    image: containrrr/watchtower:latest
    container_name: watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - WATCHTOWER_POLL_INTERVAL=300
      - WATCHTOWER_LABEL_ENABLE=true
      - WATCHTOWER_CLEANUP=true
    networks:
      - caddy_default

  ollama:
    image: ollama/ollama:latest
    container_name: curriculum-curator-ollama
    profiles:
      - local-ai
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - caddy_default

volumes:
  ollama_data:

networks:
  caddy_default:
    external: true
